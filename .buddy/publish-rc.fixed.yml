- pipeline: Publish rc
  refs:
  - refs/heads/rc
  always_from_scratch: true
  auto_clear_cache: true
  fail_on_prepare_env_warning: true
  variables:
  - key: VERSION_BUMP_TYPE
  trigger_conditions:
  - trigger_condition: SUCCESS_PIPELINE
    project: test-collector
    pipeline: run_all
  actions:
  - action: Select version bump
    type: WAIT_FOR_VARIABLES
    variables:
    - key: VERSION_BUMP_TYPE
      defaults: |-
        prerelease
        prepatch
        preminor
        premajor
  - action: Install packages
    type: BUILD
    execute_commands:
    - npm ci
    setup_commands:
    - apt-get update && apt-get -y install curl
    - curl -fsSL https://get.pnpm.io/install.sh | sh -
    shell: BASH
    volume_mappings:
    - /:/buddy-works/unit-tests
    docker_image_name: library/node
    docker_image_tag: 22
  - action: Bump version
    type: BUILD
    execute_commands:
    - git config user.email "ci@buddy.works"
    - git config user.name "Buddy CI"
    - "npm version --preid rc $VERSION_BUMP_TYPE -m \"chore(release): bump version to %s\""
    shell: BASH
    volume_mappings:
    - /:/buddy-works/unit-tests
    docker_image_name: library/node
    docker_image_tag: 22
  - action: Build
    type: BUILD
    execute_commands:
    - npm run build
    shell: BASH
    volume_mappings:
    - /:/buddy-works/unit-tests
    docker_image_name: library/node
    docker_image_tag: 22
  - action: Publish
    type: BUILD
    execute_commands:
    - npm publish --no-git-checks --access public --tag rc
    shell: BASH
    volume_mappings:
    - /:/buddy-works/unit-tests
    docker_image_name: library/node
    docker_image_tag: 22
  - action: Git Push
    type: PUSH
    push_tags: true
    target_branch: $BUDDY_RUN_BRANCH
    isolated: true
    targets:
    - project_repository
