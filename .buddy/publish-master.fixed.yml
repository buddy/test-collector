- pipeline: Publish master
  refs:
  - refs/heads/master
  always_from_scratch: true
  auto_clear_cache: true
  fail_on_prepare_env_warning: true
  environments:
  - release
  variables:
  - key: VERSION_BUMP_TYPE
  - key: npmrc
    value: "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
    type: FILE
    file_path: "~/.npmrc"
  trigger_conditions:
  - trigger_condition: SUCCESS_PIPELINE
    project: test-collector
    pipeline: run_all
  actions:
  - action: Select version bump
    type: WAIT_FOR_VARIABLES
    variables:
    - key: VERSION_BUMP_TYPE
      defaults: |-
        patch
        minor
        major
  - action: Install packages
    type: BUILD
    execute_commands:
    - npm ci
    shell: BASH
    volume_mappings:
    - /:/buddy-works/unit-tests
    docker_image_name: library/node
    docker_image_tag: 22
  - action: Bump version
    type: BUILD
    execute_commands:
    - git config user.email "ci@buddy.works"
    - git config user.name "Buddy CI"
    - "npm version $VERSION_BUMP_TYPE -m \"chore(release): bump version to %s\""
    shell: BASH
    volume_mappings:
    - /:/buddy-works/unit-tests
    docker_image_name: library/node
    docker_image_tag: 22
  - action: Build
    type: BUILD
    execute_commands:
    - npm run build
    shell: BASH
    volume_mappings:
    - /:/buddy-works/unit-tests
    docker_image_name: library/node
    docker_image_tag: 22
  - action: Publish npm package
    type: NPM_PUBLISH
    integration: npm
    npm_registry: NPM
    access: PUBLIC
  - action: Git Push
    type: PUSH
    push_tags: true
    target_branch: $BUDDY_RUN_BRANCH
    isolated: true
    targets:
    - project_repository
